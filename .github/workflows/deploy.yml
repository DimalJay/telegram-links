name: Build, Deploy and Index

on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at midnight (every 24 hours)
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [rebuild_seo]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build and generate SEO pages
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
        
      - name: Notify IndexNow
        run: npm run indexnow

      - name: Setup Google Credentials
        run: echo '${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}' > top-telegram-links-0ff5b28cd97a.json

      - name: Notify Google Indexing API
        run: npm run google-index      
