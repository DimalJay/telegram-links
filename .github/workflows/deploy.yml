name: Build, Deploy and Index

on:
  push:
    branches:
      - main
  schedule:
    # Runs at minute 0 past every 12th hour (e.g. 12:00 AM, 12:00 PM)
    - cron: '0 */12 * * *'
  repository_dispatch:
    types: [rebuild_seo]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build and generate SEO pages
        run: npm run build
        env:
          VITE_API_BASE_URL: https://telegram-links-backend-three.vercel.app
          VITE_SITE_URL: https://top-telegram-links.web.app

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
        
      - name: Notify IndexNow
        run: npm run indexnow
